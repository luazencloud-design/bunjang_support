<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>번개장터 · 당근 등록 도우미 — Designs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin:0; padding:0; font-family: 'Pretendard', 'Inter', system-ui, sans-serif; background: #f0eee9; }
    #root { width: 100vw; height: 100vh; }

    /* Tweaks panel */
    .tweaks-panel{
      position: fixed; right: 16px; bottom: 16px; width: 280px;
      background: #fff; border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px; padding: 14px; z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      font-family: 'Pretendard', 'Inter', system-ui, sans-serif;
      display: none;
    }
    .tweaks-panel.open{ display:block; }
    .tweaks-h{ font-size: 11px; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:0.08em; margin:0 0 10px; }
    .tweak-row{ display:flex; align-items:center; justify-content:space-between; padding:6px 0; font-size:13px; }
    .tweak-swatches{ display:flex; gap:6px; }
    .tw-sw{ width: 22px; height:22px; border-radius:6px; cursor:pointer; border: 2px solid transparent; }
    .tw-sw.active{ border-color: #1d1a16; }
    .tw-toggle{
      width: 32px; height: 18px; border-radius:99px; background: #ddd; position:relative; cursor:pointer;
    }
    .tw-toggle.on{ background: #1d1a16; }
    .tw-toggle::after{ content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:99px; background:white; transition:transform .15s; }
    .tw-toggle.on::after{ transform: translateX(14px); }

    /* Frame stand for extension popup */
    .browser-chrome{
      background: #ecebe8; border-radius: 14px 14px 0 0;
      border: 1px solid rgba(0,0,0,.08);
      padding: 10px 12px; display: flex; align-items: center; gap: 8px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .browser-chrome .dot{ width:10px; height:10px; border-radius:99px; background: #d9d4cb; }
    .browser-chrome .bar{
      flex:1; height: 22px; background: #fdfcfa; border-radius:6px;
      font-size: 11px; color: #8a8378; display:flex; align-items:center; padding: 0 10px;
      font-family: 'JetBrains Mono', monospace;
    }
    .popup-frame{
      border: 1px solid rgba(0,0,0,.08); border-top: none;
      background: #f0eee9;
      border-radius: 0 0 14px 14px;
      padding: 40px 60px;
      display: flex; justify-content: flex-end;
      position: relative;
    }
    .popup-inner{
      width: 420px; height: 600px;
      box-shadow: 0 12px 48px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.06);
      border-radius: 12px; overflow: hidden;
      background: white;
    }
    .ext-anchor{
      position:absolute; top: -14px; right: 116px;
      width: 24px; height: 24px; border-radius: 6px;
      background: linear-gradient(145deg, oklch(68% 0.15 45), oklch(62% 0.17 30));
      display:flex; align-items:center; justify-content:center;
      color: white; font-weight: 700; font-size: 11px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .ext-arrow{
      position: absolute; top: 24px; right: 122px;
      width: 10px; height: 10px; background: white;
      transform: rotate(45deg);
      border: 1px solid rgba(0,0,0,.08);
      border-right: none; border-bottom: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Tweaks panel -->
  <div id="tweaks" class="tweaks-panel">
    <div class="tweaks-h">Tweaks</div>
    <div class="tweak-row">
      <span>다크 모드</span>
      <div id="tw-dark" class="tw-toggle"></div>
    </div>
    <div class="tweak-row">
      <span>액센트 컬러</span>
      <div class="tweak-swatches" id="tw-accents"></div>
    </div>
    <div class="tweak-row">
      <span>스캔 자동 인식</span>
      <div id="tw-autoscan" class="tw-toggle on"></div>
    </div>
  </div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="popup.jsx"></script>
  <script type="text/babel" src="sidepanel.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "oklch(28% 0.01 60)",
      "dark": false
    }/*EDITMODE-END*/;

    const ACCENTS = [
      { name: 'orange', val: 'oklch(68% 0.15 45)' },
      { name: 'green',  val: 'oklch(60% 0.14 150)' },
      { name: 'blue',   val: 'oklch(60% 0.14 250)' },
      { name: 'violet', val: 'oklch(58% 0.16 305)' },
      { name: 'ink',    val: 'oklch(28% 0.01 60)' },
    ];

    function App(){
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

      // Wire up tweaks panel DOM
      React.useEffect(()=>{
        const accentsEl = document.getElementById('tw-accents');
        accentsEl.innerHTML = '';
        ACCENTS.forEach(a=>{
          const sw = document.createElement('div');
          sw.className = 'tw-sw' + (a.val === tweaks.accent ? ' active':'');
          sw.style.background = a.val;
          sw.onclick = ()=> setTweaks(t=>({...t, accent:a.val}));
          accentsEl.appendChild(sw);
        });
        const darkEl = document.getElementById('tw-dark');
        darkEl.className = 'tw-toggle ' + (tweaks.dark?'on':'');
        darkEl.onclick = ()=> setTweaks(t=>({...t, dark:!t.dark}));
      }, [tweaks]);

      // Edit mode protocol
      React.useEffect(()=>{
        const onMsg = (e)=>{
          if(!e.data || !e.data.type) return;
          if(e.data.type==='__activate_edit_mode'){
            document.getElementById('tweaks').classList.add('open');
          } else if(e.data.type==='__deactivate_edit_mode'){
            document.getElementById('tweaks').classList.remove('open');
          }
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({type:'__edit_mode_available'}, '*');
        return ()=> window.removeEventListener('message', onMsg);
      }, []);

      // Persist
      React.useEffect(()=>{
        window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
      }, [tweaks]);

      return (
        <DesignCanvas>
          <DCSection id="products" title="번개장터·당근 등록 도우미" subtitle="데스크톱 확장 + 현장용 모바일 PWA">
            <DCArtboard id="sidepanel" label="A · Chrome 사이드 패널 (VSCode 스타일, 520px 폭)" width={1460} height={900}>
              <div style={{width:1460, height:900, background:'#d8d5cd', padding:18, display:'flex', gap: 0, fontFamily:'Inter, sans-serif'}}>
                {/* Fake browser page */}
                <div style={{
                  flex:1, background:'#fff',
                  borderRadius: '10px 0 0 10px',
                  border: '1px solid rgba(0,0,0,.1)',
                  borderRight: 'none',
                  overflow: 'hidden',
                  display: 'flex', flexDirection: 'column'
                }}>
                  <div style={{
                    padding: '10px 14px', display:'flex', gap:8, alignItems:'center',
                    borderBottom: '1px solid rgba(0,0,0,.06)', background:'#f6f4ef'
                  }}>
                    <div style={{width:10,height:10,borderRadius:99,background:'#d9d4cb'}}/>
                    <div style={{width:10,height:10,borderRadius:99,background:'#d9d4cb'}}/>
                    <div style={{width:10,height:10,borderRadius:99,background:'#d9d4cb'}}/>
                    <div style={{flex:1, height:22, background:'#fff', border:'1px solid rgba(0,0,0,.08)', borderRadius:6, display:'flex', alignItems:'center', padding:'0 10px', fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'#8a8378'}}>
                      m.bunjang.co.kr/products/new
                    </div>
                    <div style={{width:24, height:24, borderRadius:6, background: 'linear-gradient(145deg, oklch(68% 0.15 45), oklch(62% 0.17 30))', color:'white', fontWeight:700, fontSize:11, display:'flex', alignItems:'center', justifyContent:'center'}}>B</div>
                  </div>
                  <div style={{padding: '24px 32px', flex:1, overflow:'hidden', fontFamily:'Pretendard, Inter, sans-serif'}}>
                    <div style={{fontSize:18, fontWeight:700, letterSpacing:'-0.02em', marginBottom:4, color:'#1a1a1a'}}>상품 등록</div>
                    <div style={{fontSize:12, color:'#8a8378', marginBottom:20}}>번개장터 · 중고거래</div>
                    <div style={{display:'flex', flexDirection:'column', gap:14}}>
                      {[
                        { label:'상품 이미지', note:'3/3', filled:true },
                        { label:'상품명', note:'입력됨' },
                        { label:'카테고리', note:'선택 필요', warn: true },
                        { label:'가격', note:'입력됨' },
                        { label:'상품 설명', note:'입력됨' },
                        { label:'배송 방법', note:'선택 필요', warn: true },
                      ].map((r,i)=>(
                        <div key={i} style={{
                          padding: '14px 16px',
                          background: r.warn ? 'oklch(97% 0.03 60)' : '#fff',
                          border: `1px solid ${r.warn ? 'oklch(68% 0.15 45 / 0.3)' : 'rgba(0,0,0,.08)'}`,
                          borderRadius: 10,
                          display:'flex', alignItems:'center', justifyContent:'space-between'
                        }}>
                          <div>
                            <div style={{fontSize:13, fontWeight:500, color:'#1a1a1a'}}>{r.label}</div>
                            {r.filled && <div style={{display:'flex', gap:4, marginTop:6}}>
                              <div style={{width:34, height:34, borderRadius:6, background:'#e8dfd3'}}/>
                              <div style={{width:34, height:34, borderRadius:6, background:'#dfd5c4'}}/>
                              <div style={{width:34, height:34, borderRadius:6, background:'#d3c5ad'}}/>
                            </div>}
                          </div>
                          <div style={{fontSize:11, color: r.warn ? 'oklch(58% 0.18 25)' : 'oklch(60% 0.14 150)', fontWeight:600}}>
                            {r.note}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                {/* Side panel */}
                <div style={{
                  width: 520, height: '100%',
                  background: '#fbfaf7',
                  border: '1px solid rgba(0,0,0,.1)',
                  borderRadius: '0 10px 10px 0',
                  overflow: 'hidden',
                  boxShadow: '-4px 0 16px rgba(0,0,0,.05)'
                }}>
                  <SidePanel tweaks={tweaks}/>
                </div>
              </div>
            </DCArtboard>

            <DCArtboard id="popup" label="B · 기존 팝업 (420×600, 참고용)" width={660} height={760}>
              <div style={{width: 660, height: 760, padding:'20px 30px', background:'#f0eee9', fontFamily:'Inter, sans-serif', position:'relative'}}>
                <div className="browser-chrome">
                  <div className="dot"/><div className="dot"/><div className="dot"/>
                  <div className="bar">m.bunjang.co.kr/products/new</div>
                </div>
                <div className="popup-frame">
                  <div className="ext-anchor">B</div>
                  <div className="ext-arrow"/>
                  <div className="popup-inner">
                    <ExtensionPopup tweaks={tweaks}/>
                  </div>
                </div>
              </div>
            </DCArtboard>

            <DCArtboard id="mobile" label="C · 모바일 PWA 스캐너" width={460} height={900}>
              <div style={{width:460, height:900, background:'#f0eee9', display:'flex', alignItems:'center', justifyContent:'center'}}>
                <IOSDevice>
                  <div style={{width:'100%', height:'100%', display:'flex', flexDirection:'column', background: tweaks.dark ? '#101011' : '#fbfaf7'}}>
                    <IOSStatusBar dark={tweaks.dark}/>
                    <div style={{flex:1, overflow:'hidden'}}>
                      <MobilePWA tweaks={tweaks}/>
                    </div>
                  </div>
                </IOSDevice>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="flow" title="핵심 사용 흐름" subtitle="현장에서 상품 등록까지">
            <DCArtboard id="flow" label="사용자 워크플로우" width={1100} height={320}>
              <FlowDiagram />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    function FlowDiagram(){
      const steps = [
        { n:1, t:'매장 현장', d:'바코드 스캔 + 사진 촬영', c:'모바일 PWA', icon:'📦' },
        { n:2, t:'메루카리 조회', d:'원가/시세 확인', c:'모바일 PWA', icon:'🔍' },
        { n:3, t:'귀가 후', d:'AI로 상품명 5종 생성', c:'Chrome 확장', icon:'✨' },
        { n:4, t:'템플릿 조합', d:'설명·배송·보증 삽입', c:'Chrome 확장', icon:'📝' },
        { n:5, t:'번개장터 자동입력', d:'DOM 주입 · 진단', c:'Chrome 확장', icon:'🛒' },
        { n:6, t:'당근 복사+열기', d:'이미지 다운로드', c:'Chrome 확장', icon:'🥕' },
      ];
      return (
        <div style={{
          width: 1100, height: 320,
          padding: '40px 32px',
          background: '#fff',
          display:'flex', alignItems:'center', gap: 6,
          fontFamily: 'Pretendard, Inter, sans-serif',
        }}>
          {steps.map((s,i)=>(
            <React.Fragment key={s.n}>
              <div style={{
                flex:1, padding: '18px 14px',
                border: '1px solid rgba(0,0,0,.08)',
                borderRadius: 12,
                background: s.c==='모바일 PWA' ? 'oklch(97% 0.02 150)' : 'oklch(97% 0.02 45)',
                minHeight: 170,
                display:'flex', flexDirection:'column', gap:8,
              }}>
                <div style={{display:'flex', alignItems:'center', gap:6, fontSize:10, fontWeight:700, color: '#5d574d', letterSpacing:'0.05em', textTransform:'uppercase'}}>
                  <span style={{
                    width:18, height:18, borderRadius:'50%',
                    background: '#1d1a16', color:'white',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize: 10, fontFamily: 'JetBrains Mono, monospace'
                  }}>{s.n}</span>
                  {s.c}
                </div>
                <div style={{fontSize: 22, marginTop: 4}}>{s.icon}</div>
                <div style={{fontSize:15, fontWeight:600, letterSpacing:'-0.02em'}}>{s.t}</div>
                <div style={{fontSize:12, color:'#5d574d', lineHeight:1.4}}>{s.d}</div>
              </div>
              {i < steps.length - 1 && (
                <div style={{color:'#9a938a', fontSize:18}}>→</div>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
